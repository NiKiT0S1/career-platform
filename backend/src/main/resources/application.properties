# Main backend application configuration:
# database connection, JWT settings, file storage paths and multipart upload limits.

spring.application.name=backend

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update

# FOR DEV
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true

# FOR PROD
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000
#spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

server.port=${PORT:8080}

file.upload-dir=uploads/resumes
file.contracts-dir=uploads/contracts
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

r2.account-id=${R2_ACCOUNT_ID}
r2.access-key-id=${R2_ACCESS_KEY_ID}
r2.secret-access-key=${R2_SECRET_ACCESS_KEY}
r2.bucket-name=${R2_BUCKET_NAME}
r2.endpoint=${R2_ENDPOINT}

app.frontend.url=${APP_FRONTEND_URL}